name: Bug report
description: Something is broken in AgentFlow — wrong response, crash, regression, infrastructure misbehavior.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        **Security issue?** Do not file it here — see [SECURITY.md](../../SECURITY.md)
        for private reporting channels.

        **On-call symptom?** Check [docs/runbooks/](../../docs/runbooks/README.md)
        first — most production symptoms have a documented triage path.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences. What is broken and how do you know?
      placeholder: "GET /v1/entity/order/{id} returns 500 instead of 404 for unknown IDs since v1.3.0."
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Affected version
      description: AgentFlow version (`pip show agentflow-runtime`, `pip show agentflow-client`, or `npm view @yuliaedomskikh/agentflow-client version`).
      placeholder: "agentflow-runtime 1.3.0, agentflow-client 1.3.0"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      multiple: true
      options:
        - API (`src/serving/api/`)
        - Python SDK (`sdk/agentflow/`)
        - TypeScript SDK (`sdk-ts/`)
        - Helm chart (`helm/agentflow/`)
        - Kafka Connect chart (`helm/kafka-connect/`)
        - CDC pipeline
        - DV2 multi-branch demo
        - Documentation
        - CI / release pipeline
        - Other
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce. Curl commands, Python snippets, or `make demo` invocations are all welcome.
      placeholder: |
        1. `make demo`
        2. `curl http://localhost:8000/v1/entity/order/does-not-exist`
        3. Observe HTTP 500 instead of 404
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "Should return 404 with a structured error body."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, status codes, stack traces, log lines.
      placeholder: "HTTP 500 with body { \"detail\": \"Internal server error\" }. API log shows: KeyError: 'does-not-exist'."
      render: text
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python / Node version, deployment shape (local, Docker, Helm, etc.).
      placeholder: |
        - OS: Ubuntu 22.04
        - Python: 3.11.6
        - Deployment: `docker compose -f docker-compose.prod.yml`
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else — workarounds you tried, related issues, links to logs.
    validations:
      required: false
