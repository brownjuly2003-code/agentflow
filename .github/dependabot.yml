version: 2

# AgentFlow dependency-update policy.
#
# Each ecosystem gets a weekly schedule, conventional-commit prefix that
# matches CONTRIBUTING.md, and a grouped minor+patch PR so the review
# queue does not get spammed. Major bumps stay individual.
#
# Dependabot version updates (the schedule below) are a different feature
# from Dependabot SECURITY updates. Security updates are a separate
# repo-level toggle. Gate 2 (2026-07-16) enabled both vulnerability alerts
# and automated security fixes on this repo:
#
#   gh api --method PUT repos/brownjuly2003-code/agentflow/vulnerability-alerts
#   gh api --method PUT repos/brownjuly2003-code/agentflow/automated-security-fixes
#
# Advisories now open a security-update PR immediately; the weekly schedule
# below still covers ordinary version bumps. This file cannot flip the
# toggle by itself — verify with:
#
#   gh api repos/brownjuly2003-code/agentflow --jq .security_and_analysis

updates:
  # ── Python: root runtime (agentflow-runtime) ───────────────────────
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - python
    groups:
      python-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    ignore:
      # langchain-core / langchain-text-splitters / langsmith / dagster
      # have explicit floors in pyproject.toml driven by CVE fixes
      # (see commit e8b1237 and the A06 dependency-profiles block).
      # Allow minor + patch within the >= floor, never major.
      - dependency-name: "langchain-core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "langchain-text-splitters"
        update-types: ["version-update:semver-major"]
      - dependency-name: "langsmith"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dagster"
        update-types: ["version-update:semver-major"]

  # ── Python: SDK (agentflow-client) ─────────────────────────────────
  - package-ecosystem: pip
    directory: "/sdk"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps,sdk)"
    labels:
      - dependencies
      - python
      - sdk

  # ── Python: integrations (agentflow-integrations) ──────────────────
  - package-ecosystem: pip
    directory: "/integrations"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps,integrations)"
    labels:
      - dependencies
      - python
      - integrations

  # ── npm: TypeScript SDK ────────────────────────────────────────────
  - package-ecosystem: npm
    directory: "/sdk-ts"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps,sdk-ts)"
    labels:
      - dependencies
      - javascript
      - sdk
    groups:
      sdk-ts-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # ── Docker: all image bases (digest-pinned FROM lines) ─────────────
  # Covers every Dockerfile so the sha256 digest pins keep moving with
  # the upstream tags instead of going stale.
  - package-ecosystem: docker
    directories:
      - "/"
      - "/src/processing/flink_jobs"
      - "/docker/kafka-connect"
      - "/.devcontainer"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps,docker)"
    labels:
      - dependencies
      - docker
    ignore:
      # Container images track the CI-tested runtime line (python 3.11 in
      # every ci.yml job and all Dockerfiles; the flink image additionally
      # rides PyFlink/pemja support). Digest and patch updates flow; the
      # interpreter line moves only through a deliberate, validated bump
      # session (the Flink-2.2.1 precedent), not a Dependabot PR.
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      # The production-CDC evidence path (Debezium 3.5 plugin, capture
      # script, kafka-get-offsets shape) is proven against cp-7.7.x; a
      # Kafka-platform major needs its own validated session.
      - dependency-name: "confluentinc/cp-kafka-connect-base"
        update-types:
          - "version-update:semver-major"

  # ── GitHub Actions: workflow pins ──────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps,ci)"
    labels:
      - dependencies
      - ci
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    ignore:
      # The operator-dispatched signing jobs (container-attestation.yml)
      # were validated end-to-end with cosign-installer v3; take the v4
      # major deliberately, paired with a real signing run.
      - dependency-name: "sigstore/cosign-installer"
        update-types:
          - "version-update:semver-major"

  # ── Terraform: infrastructure modules ──────────────────────────────
  - package-ecosystem: terraform
    directory: "/infrastructure/terraform"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps,terraform)"
    labels:
      - dependencies
      - terraform
