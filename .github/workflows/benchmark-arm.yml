name: ARM Benchmark

# Operator-dispatched benchmark on real ARM server hardware (backlog item 21).
# Runs on the free GitHub-hosted arm64 runner for public repositories
# (ubuntu-24.04-arm: Cobalt 100, Arm Neoverse N2, Armv9-A, 4 vCPU) — the
# $0-budget production-hardware class approved by the 2026-06-05 operator
# decision. Not a required check; evidence is recorded into docs/perf/ from
# the uploaded artifacts.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark-arm:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev,load,cloud]"
      - name: Record host metadata
        run: |
          mkdir -p .artifacts/benchmark
          {
            echo "# ARM benchmark host metadata"
            echo
            echo "Generated by workflow run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '```'
            uname -a
            echo "runner-label: ubuntu-24.04-arm"
            nproc
            lscpu
            free -h
            echo '```'
          } > .artifacts/benchmark/arm-host-metadata.md
      - name: Run benchmark
        run: >
          python scripts/run_benchmark.py
          --report-path .artifacts/benchmark/arm-benchmark.md
          --results-json .artifacts/benchmark/arm-current.json
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arm-benchmark
          path: |
            .artifacts/benchmark/arm-host-metadata.md
            .artifacts/benchmark/arm-benchmark.md
            .artifacts/benchmark/arm-current.json
          if-no-files-found: error
