name: Chaos Engineering

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/chaos/**"
      - "docker-compose.chaos.yml"
  schedule:
    - cron: "0 3 * * 2,4"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  chaos-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-json-report

      - name: Start chaos stack
        run: |
          mkdir -p .artifacts/chaos
          docker compose -p agentflow-chaos -f docker-compose.chaos.yml up -d --wait --wait-timeout 120

      - name: Run chaos smoke tests
        env:
          AGENTFLOW_CHAOS_CI_MODE: "1"
          AGENTFLOW_CHAOS_STARTUP_TIMEOUT: "120"
          PYTHONUNBUFFERED: "1"
        run: python -m pytest tests/chaos/test_chaos_smoke.py -v --tb=short --json-report --json-report-file=.artifacts/chaos/chaos-report.json

      - name: Generate chaos report
        if: always()
        run: |
          python scripts/chaos_report.py \
            --input .artifacts/chaos/chaos-report.json \
            --output .artifacts/chaos/chaos-summary.json \
            --markdown .artifacts/chaos/chaos-summary.md

      - name: Collect compose logs
        if: always()
        run: docker compose -p agentflow-chaos -f docker-compose.chaos.yml logs --no-color > .artifacts/chaos/docker-compose.log

      - name: Upload chaos artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-smoke-report
          path: .artifacts/chaos/

      - name: Tear down chaos stack
        if: always()
        run: docker compose -p agentflow-chaos -f docker-compose.chaos.yml down -v

  chaos-full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-json-report

      - name: Start chaos stack
        run: |
          mkdir -p .artifacts/chaos
          docker compose -p agentflow-chaos -f docker-compose.chaos.yml up -d --wait --wait-timeout 120

      - name: Run chaos tests
        env:
          AGENTFLOW_CHAOS_CI_MODE: "1"
          AGENTFLOW_CHAOS_STARTUP_TIMEOUT: "120"
          PYTHONUNBUFFERED: "1"
        run: python -m pytest tests/chaos/ -v --tb=short --json-report --json-report-file=.artifacts/chaos/chaos-report.json

      - name: Generate chaos report
        if: always()
        run: |
          python scripts/chaos_report.py \
            --input .artifacts/chaos/chaos-report.json \
            --output .artifacts/chaos/chaos-summary.json \
            --markdown .artifacts/chaos/chaos-summary.md

      - name: Collect compose logs
        if: always()
        run: docker compose -p agentflow-chaos -f docker-compose.chaos.yml logs --no-color > .artifacts/chaos/docker-compose.log

      - name: Create issue on chaos failure
        if: failure() && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f .artifacts/chaos/chaos-summary.md ]; then
            cat <<EOF > .artifacts/chaos/chaos-summary.md
          # Chaos workflow failed

          - workflow: ${GITHUB_WORKFLOW}
          - run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - sha: ${GITHUB_SHA}
          EOF
          fi
          gh issue create \
            --title "Chaos workflow failed for ${GITHUB_SHA::7}" \
            --body-file .artifacts/chaos/chaos-summary.md

      - name: Upload chaos artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-report
          path: .artifacts/chaos/

      - name: Tear down chaos stack
        if: always()
        run: docker compose -p agentflow-chaos -f docker-compose.chaos.yml down -v
