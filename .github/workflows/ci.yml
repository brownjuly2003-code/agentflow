name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: Type check
        run: mypy src/ --ignore-missing-imports

  schema-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Check schema evolution
        run: python scripts/check_schema_evolution.py

  test-unit:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev,integrations]"
      - name: Run unit and property tests with coverage
        run: python -m pytest tests/unit/ tests/property/ -v --tb=short --cov=src --cov=sdk --cov-report=xml --cov-report=term-missing --cov-fail-under=80
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          use_oidc: true
          fail_ci_if_error: false

  test-integration:
    runs-on: ubuntu-latest
    needs: lint
    services:
      kafka:
        image: confluentinc/cp-kafka:7.7.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:29093
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          CLUSTER_ID: "CITestCluster01"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Wait for Kafka
        run: |
          timeout 30 bash -c 'until nc -z localhost 9092; do sleep 1; done'
      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  perf-check:
    runs-on: ubuntu-latest
    needs:
      - test-unit
      - test-integration
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev,load]"
      - name: Run benchmark
        run: python scripts/run_benchmark.py
      - name: Convert benchmark report to JSON
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          report_path = Path("docs/benchmark.md")
          report = report_path.read_text(encoding="utf-8")
          lines = [line.strip() for line in report.splitlines() if line.startswith("|")]
          if len(lines) < 3:
              raise SystemExit("Benchmark results table not found in docs/benchmark.md")

          generated_at_match = re.search(r"Generated: `([^`]+)`", report)
          endpoints = {}
          for line in lines[2:]:
              columns = [column.strip() for column in line.strip("|").split("|")]
              if len(columns) != 8:
                  continue
              endpoint, requests, failures, failure_rate, rps, p50, p95, p99 = columns
              endpoints[endpoint] = {
                  "request_count": int(requests),
                  "failure_count": int(failures),
                  "failure_rate_percent": float(failure_rate.removesuffix("%")),
                  "requests_per_second": float(rps),
                  "p50_latency_ms": float(p50.removesuffix(" ms")),
                  "p95_latency_ms": float(p95.removesuffix(" ms")),
                  "p99_latency_ms": float(p99.removesuffix(" ms")),
              }

          aggregate = endpoints.pop("ALL", None)
          if aggregate is None:
              raise SystemExit("Missing ALL aggregate row in benchmark report.")

          current_report = {
              "generated_at": generated_at_match.group(1) if generated_at_match else None,
              "source": str(report_path),
              "aggregate": aggregate,
              "endpoints": endpoints,
          }
          Path("/tmp/current.json").write_text(
              json.dumps(current_report, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Compare to baseline
        run: python scripts/check_performance.py docs/benchmark-baseline.json /tmp/current.json

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"
      - name: Terraform fmt check
        run: terraform fmt -check -recursive infrastructure/terraform/
      - name: Terraform init
        run: |
          cd infrastructure/terraform
          terraform init -backend=false
      - name: Terraform validate
        run: |
          cd infrastructure/terraform
          terraform validate

  record-deployment:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success() && github.actor != 'github-actions[bot]'
    needs:
      - schema-check
      - test-unit
      - test-integration
      - perf-check
      - terraform-validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Record deployment
        run: |
          mkdir -p .dora
          echo "{\"ts\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"sha\": \"${{ github.sha }}\", \"event\": \"deploy\"}" >> .dora/deployments.jsonl
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .dora/deployments.jsonl
          git diff --cached --quiet || git commit -m "ci: record deployment ${{ github.sha }}"
          git push origin HEAD:main
