name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AGENTFLOW_E2E_BASE_URL: http://127.0.0.1:8000
      AGENTFLOW_E2E_CALLBACK_HOST: host.docker.internal
      AGENTFLOW_E2E_SUPPORT_KEY: af-prod-agent-support-abc123
      AGENTFLOW_E2E_OPS_KEY: af-prod-agent-ops-def456
      AGENTFLOW_E2E_RATE_LIMIT_KEY: af-prod-agent-rate-e2e000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install -r requirements.txt
          python -m pip install click rich pyyaml pytest-timeout

      - name: Prepare E2E compose override
        run: |
          cat <<'EOF' > docker-compose.e2e.override.yml
          services:
            agentflow-api:
              environment:
                AGENTFLOW_API_KEYS: "af-prod-agent-support-abc123:Support Agent,af-prod-agent-ops-def456:Ops Agent,af-prod-agent-rate-e2e000:Rate Limit Agent"
                AGENTFLOW_RATE_LIMIT_RPM: "120"
                AGENTFLOW_USAGE_DB_PATH: /app/data/agentflow_api_usage.duckdb
                AGENTFLOW_WEBHOOKS_FILE: /app/data/e2e-webhooks.yaml
                OTEL_SDK_DISABLED: "true"
              extra_hosts:
                - "host.docker.internal:host-gateway"
          EOF

      - name: Start API
        run: |
          docker compose -f docker-compose.prod.yml -f docker-compose.e2e.override.yml up -d redis agentflow-api
          python scripts/wait_for_services.py --url "$AGENTFLOW_E2E_BASE_URL" --timeout 120

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --tb=short --timeout=60

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker-compose.prod.yml -f docker-compose.e2e.override.yml logs > e2e-logs.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: e2e-logs.txt

      - name: Stop API
        if: always()
        run: |
          docker compose -f docker-compose.prod.yml -f docker-compose.e2e.override.yml down -v
