name: Nightly Performance

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  perf-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev,load,cloud]"
      - name: Run canonical benchmark
        # DuckDB-profile benchmark: no ClickHouse service on the runner host,
        # and the baseline predates the ClickHouse serving flip.
        env:
          SERVING_BACKEND: duckdb
        run: |
          python scripts/run_benchmark.py \
            --results-json .artifacts/benchmark/current.json \
            --report-path .artifacts/benchmark/benchmark.md
      - name: Compare to baseline
        run: python scripts/check_performance.py docs/benchmark-baseline.json .artifacts/benchmark/current.json
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-baseline-results
          path: .artifacts/benchmark/
