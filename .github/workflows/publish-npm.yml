name: Publish TypeScript SDK

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version to publish, without leading v"
        required: true
  push:
    tags:
      - "sdk-v*"
      - "v*-rc*"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm identity
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm whoami --registry=https://registry.npmjs.org/
          npm access list packages @agentflow --registry=https://registry.npmjs.org/ || true
          npm org ls agentflow --registry=https://registry.npmjs.org/ || true

      - name: Verify release tag matches SDK metadata
        env:
          MANUAL_RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          node - <<'NODE'
          const fs = require("node:fs");

          const tag = process.env.GITHUB_REF_NAME;
          let expectedVersion;
          if (process.env.GITHUB_EVENT_NAME === "workflow_dispatch") {
            expectedVersion = process.env.MANUAL_RELEASE_VERSION;
          } else if (tag?.startsWith("sdk-v")) {
            expectedVersion = tag.slice("sdk-v".length);
          } else if (tag?.startsWith("v")) {
            expectedVersion = tag.slice("v".length);
          } else {
            throw new Error(`Unexpected tag format: ${tag ?? "<missing>"}`);
          }
          if (!expectedVersion) {
            throw new Error("Missing release version");
          }

          const expectedPythonVersion = expectedVersion.replace("-rc", "rc");
          const pyproject = fs.readFileSync("sdk/pyproject.toml", "utf8");
          const packageJson = JSON.parse(fs.readFileSync("sdk-ts/package.json", "utf8"));
          const pythonMatch = pyproject.match(/^version = "([^"]+)"$/m);

          if (!pythonMatch) {
            throw new Error("Could not read sdk/pyproject.toml version");
          }
          if (pythonMatch[1] !== expectedPythonVersion) {
            throw new Error(
              `sdk/pyproject.toml version ${pythonMatch[1]} does not match tag ${expectedPythonVersion}`,
            );
          }
          if (packageJson.version !== expectedVersion) {
            throw new Error(
              `sdk-ts/package.json version ${packageJson.version} does not match tag ${expectedVersion}`,
            );
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `RELEASE_VERSION=${expectedVersion}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `PYTHON_RELEASE_VERSION=${expectedPythonVersion}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `IS_RC=${String(expectedVersion.includes("-rc"))}\n`);
          NODE

      - name: Install dependencies
        working-directory: sdk-ts
        run: npm ci

      - name: npm audit (moderate)
        working-directory: sdk-ts
        run: npm audit --audit-level=moderate

      - name: Typecheck SDK
        working-directory: sdk-ts
        run: npm run typecheck

      - name: Test SDK
        working-directory: sdk-ts
        run: npm test

      - name: Build SDK
        working-directory: sdk-ts
        run: npm run build

      - name: Dry-run npm rc publish
        if: env.IS_RC == 'true'
        working-directory: sdk-ts
        run: npm publish --dry-run --access public --tag next

      - name: Dry-run npm production publish
        if: env.IS_RC != 'true'
        working-directory: sdk-ts
        run: npm publish --dry-run --access public

      - name: Skip npm upload for rc smoke
        if: env.IS_RC == 'true'
        working-directory: sdk-ts
        run: echo "RC smoke uses npm publish --dry-run only; no npm registry upload."

      - name: Publish to npm
        if: env.IS_RC != 'true'
        working-directory: sdk-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_OTP: ${{ secrets.NPM_OTP }}
        run: |
          if [ -n "${NPM_OTP:-}" ]; then
            npm publish --access public --otp "$NPM_OTP"
          else
            npm publish --access public
          fi
