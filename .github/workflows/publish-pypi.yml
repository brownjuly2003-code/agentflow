name: Publish Python Packages

on:
  push:
    tags:
      - "sdk-v*"
      - "v*-rc*"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TEST_PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify release tag matches package metadata
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          if tag.startswith("sdk-v"):
              release_version = tag.removeprefix("sdk-v")
          elif tag.startswith("v"):
              release_version = tag.removeprefix("v")
          else:
              raise SystemExit(f"Unexpected tag format: {tag}")

          python_version = release_version.replace("-rc", "rc", 1)
          root_pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          sdk_pyproject = tomllib.loads(Path("sdk/pyproject.toml").read_text(encoding="utf-8"))

          root_version = root_pyproject["project"]["version"]
          sdk_version = sdk_pyproject["project"]["version"]

          if root_version != python_version:
              raise SystemExit(
                  f"pyproject.toml version {root_version} does not match tag {python_version}"
              )
          if sdk_version != python_version:
              raise SystemExit(
                  f"sdk/pyproject.toml version {sdk_version} does not match tag {python_version}"
              )

          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env:
              env.write(f"RELEASE_VERSION={release_version}\n")
              env.write(f"PYTHON_RELEASE_VERSION={python_version}\n")
              env.write(f"IS_RC={str('-rc' in release_version).lower()}\n")
          PY

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Clean previous distributions
        run: rm -rf dist sdk/dist

      - name: Build Python distributions
        run: |
          python -m build .
          python -m build sdk/

      - name: Dry-run build and twine check
        run: python -m twine check dist/* sdk/dist/*

      - name: Publish rc packages to TestPyPI
        if: env.IS_RC == 'true' && env.TEST_PYPI_API_TOKEN != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: python -m twine upload --repository-url https://test.pypi.org/legacy/ dist/* sdk/dist/*

      - name: Skip TestPyPI upload without token
        if: env.IS_RC == 'true' && env.TEST_PYPI_API_TOKEN == ''
        run: echo "RC smoke completed with twine check only; TEST_PYPI_API_TOKEN is not configured."

      - name: Publish agentflow-runtime to PyPI (OIDC)
        if: env.IS_RC != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Publish agentflow SDK to PyPI (OIDC)
        if: env.IS_RC != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist/
