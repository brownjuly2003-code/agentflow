name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - staging
          - production
      confirm:
        description: Type PREFLIGHT for local readiness checks; APPLY remains disabled until external approval
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  preflight:
    if: ${{ inputs.confirm == 'PREFLIGHT' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Resolve Terraform tfvars file
        id: tfvars
        run: |
          case "${{ inputs.environment }}" in
            staging) echo "file=environments/staging.tfvars" >> "$GITHUB_OUTPUT" ;;
            production) echo "file=environments/prod.tfvars" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unsupported environment: ${{ inputs.environment }}" >&2; exit 1 ;;
          esac

      - name: Validate OIDC and plan readiness without apply
        working-directory: infrastructure/terraform
        env:
          AWS_TERRAFORM_ROLE_ARN: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          missing=0
          if [ -z "$AWS_TERRAFORM_ROLE_ARN" ]; then
            echo "Missing AWS_TERRAFORM_ROLE_ARN repository variable"
            missing=1
          fi
          if [ -z "$AWS_REGION" ]; then
            echo "Missing AWS_REGION repository variable"
            missing=1
          fi
          if [ ! -f "${{ steps.tfvars.outputs.file }}" ]; then
            echo "Missing ${{ steps.tfvars.outputs.file }}"
            echo "Provide real tfvars through the approved secure operator path; do not commit them."
            missing=1
          fi
          echo "H4 remains evidence-pending until CloudTrail proves AssumeRoleWithWebIdentity and an owner-approved apply run exists."
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          terraform init -backend=false
          terraform validate

  plan:
    # disabled 2026-04-23: see docs/codex-tasks/2026-04-24/T09-terraform-apply-oidc-readiness.md
    # re-enable checklist:
    # 1. Add repo-level vars AWS_TERRAFORM_ROLE_ARN and AWS_REGION for the plan job.
    # 2. Provide infrastructure/terraform/environments/staging.tfvars and either prod.tfvars or remove the production option.
    # 3. Create GitHub Actions environments staging and production.
    # 4. Capture a green staging run that proves OIDC assume-role, terraform init, and terraform plan.
    # 5. Restore if: inputs.confirm == 'APPLY' for both jobs.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Resolve Terraform tfvars file
        id: tfvars
        run: |
          case "${{ inputs.environment }}" in
            staging) echo "file=environments/staging.tfvars" >> "$GITHUB_OUTPUT" ;;
            production) echo "file=environments/prod.tfvars" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unsupported environment: ${{ inputs.environment }}" >&2; exit 1 ;;
          esac

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gha-terraform-${{ github.run_id }}

      - name: Validate tfvars presence
        working-directory: infrastructure/terraform
        run: |
          if [ ! -f "${{ steps.tfvars.outputs.file }}" ]; then
            echo "Missing ${{ steps.tfvars.outputs.file }}"
            echo "Copy the matching .tfvars.example file and provide real network values."
            exit 1
          fi

      - name: Terraform plan
        working-directory: infrastructure/terraform
        run: |
          terraform init
          terraform plan -var-file="${{ steps.tfvars.outputs.file }}" -out=tfplan

      - uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ inputs.environment }}
          path: infrastructure/terraform/tfplan

  apply:
    # disabled 2026-04-23: see docs/codex-tasks/2026-04-24/T09-terraform-apply-oidc-readiness.md
    if: false
    needs: plan
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Resolve Terraform tfvars file
        id: tfvars
        run: |
          case "${{ inputs.environment }}" in
            staging) echo "file=environments/staging.tfvars" >> "$GITHUB_OUTPUT" ;;
            production) echo "file=environments/prod.tfvars" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unsupported environment: ${{ inputs.environment }}" >&2; exit 1 ;;
          esac

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gha-terraform-${{ github.run_id }}

      - uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ inputs.environment }}
          path: infrastructure/terraform

      - name: Terraform apply
        working-directory: infrastructure/terraform
        run: |
          terraform init
          terraform apply -auto-approve tfplan
