coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 0%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true

ignore:
  - "tests/**/*"
  - "scripts/**/*"
  - "examples/**/*"
  - "sdk-ts/**/*"
  - "notebooks/**/*"
