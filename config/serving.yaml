# Serving engine (ADR 0006): the demo and production serving path is
# ClickHouse; DuckDB remains the local-dev / test and compatibility store
# (tests pin SERVING_BACKEND=duckdb in tests/conftest.py). Override at runtime
# with SERVING_BACKEND=duckdb to roll back — Phase 1 is config-reversible.
backend: clickhouse

clickhouse:
  host: localhost
  port: 8123
  user: default
  password: ""
  database: agentflow
  secure: false
  # PEM CA bundle for a private-CA HTTPS endpoint; only read with
  # secure: true, and then it REPLACES the system trust store for this
  # connection (audit P2-3). Env override: CLICKHOUSE_CA_CERT.
  ca_cert: ""
  timeout_seconds: 10
