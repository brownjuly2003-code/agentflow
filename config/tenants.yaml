# A tenant is isolated by the `tenant_id` column on every serving table, which
# leads that table's write key (ADR-004). There is nothing to declare here for
# that to hold — a tenant id is a value, not a schema to provision.
tenants:
  - id: acme-corp
    display_name: "Acme Corp"
    kafka_topic_prefix: "acme"
    max_events_per_day: 1000000
    max_api_keys: 10
    allowed_entity_types: null

  - id: demo
    display_name: "Demo Tenant"
    kafka_topic_prefix: "demo"
    max_events_per_day: 10000
    max_api_keys: 2
    allowed_entity_types:
      - "order"
      - "product"
