name: order
description: Customer orders with status and total
table: orders_v2
primary_key: order_id
fields:
  order_id: Unique order identifier (ORD-YYYYMMDD-NNNN)
  user_id: Customer identifier
  status: "Current status: pending, confirmed, shipped, delivered, cancelled"
  total_amount: Order total in the order currency
  currency: ISO 4217 alpha-3 currency code (RUB primary; AED/KZT on branch-currency reads)
  created_at: Order creation timestamp
relationships:
  user: user_id
stages:
  - name: pending
    sla_minutes: 30
    description: Confirmation SLA — marketplace orders auto-confirm within
      minutes; a pending order older than this needs a payment/CRM decision
  - name: confirmed
    sla_minutes: 1440
    description: Ship-by SLA — FBS marketplace shipping deadlines drive the
      24h budget for warehouse handover
  - name: shipped
    sla_minutes: 7200
    description: Delivery SLA — 5 days courier/pickup before a customer
      contact is due
  - name: delivered
    terminal: true
  - name: cancelled
    terminal: true
