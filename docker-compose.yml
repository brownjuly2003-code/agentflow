services:
  # ── Kafka (KRaft mode, no Zookeeper) ──────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "AgentFlowKafkaCluster01"
      KAFKA_JMX_PORT: 9101
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "Creating Kafka topics..."
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders.raw --partitions 6 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payments.raw --partitions 6 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic clicks.raw --partitions 6 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic products.cdc --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic events.validated --partitions 6 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic events.deadletter --partitions 3 --replication-factor 1
        # The stream processor's KafkaSource subscribes to the CDC topics too
        # (src/processing/flink_jobs/stream_processor.py). Kafka refuses to hand
        # out metadata for a topic that does not exist, so the job dies in a
        # restart loop -- "Failed to get metadata for topics [...]" -- before it
        # ever reads orders.raw. Debezium creates these in a full deployment;
        # locally they stay empty, and empty is fine. Absent is not.
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic cdc.postgres.public.orders_v2 --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic cdc.postgres.public.users_enriched --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic cdc.mysql.agentflow_demo.products_current --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic cdc.mysql.agentflow_demo.sessions_aggregated --partitions 1 --replication-factor 1
        echo "Topics created."

  # ── Flink ─────────────────────────────────────────────────────
  flink-jobmanager:
    image: flink:2.3.0-java17
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.bind-host: 0.0.0.0
        rest.bind-host: 0.0.0.0
        state.backend.type: rocksdb
        execution.checkpointing.dir: s3://agentflow-lake/checkpoints
        s3.endpoint: http://minio:9000
        s3.access-key: minio
        s3.secret-key: minio123
        s3.path.style.access: true
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 10s
      timeout: 5s
      retries: 5

  flink-taskmanager:
    image: flink:2.3.0-java17
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.bind-host: 0.0.0.0
        taskmanager.numberOfTaskSlots: 4
        state.backend.type: rocksdb
        s3.endpoint: http://minio:9000
        s3.access-key: minio
        s3.secret-key: minio123
        s3.path.style.access: true
    deploy:
      replicas: 2

  # ── MinIO (S3-compatible object store) ────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        # `local` is one of mc's BUILT-IN aliases (http://localhost:9000). When
        # `alias set local` failed, every `mc mb local/...` below silently went
        # to the mc container's own loopback, failed too, and the script still
        # printed success -- leaving Flink to block forever on a checkpoint
        # bucket that did not exist. Use a name mc does not ship, and let a
        # failure fail the container.
        for attempt in $$(seq 1 30); do
          mc alias set lake http://minio:9000 minio minio123 && break
          echo "waiting for minio (attempt $$attempt)"
          sleep 2
        done
        mc mb --ignore-existing lake/agentflow-lake
        mc mb --ignore-existing -p lake/agentflow-lake/warehouse
        mc mb --ignore-existing -p lake/agentflow-lake/checkpoints
        mc ls lake/agentflow-lake
        echo "MinIO buckets created."

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ── ClickHouse (serving store, ADR 0006) ──────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "127.0.0.1:8123:8123"
      # ClickHouse's native protocol, published on 9010 rather than its default
      # 9000: MinIO already owns host 9000 in this file, and config/iceberg.yaml
      # points the S3 endpoint at localhost:9000. Publishing both collided, so
      # the Flink/MinIO lake path and the ClickHouse serving backend could not
      # be brought up together — which is exactly the topology the serving
      # bridge needs (Flink -> events.validated -> bridge -> ClickHouse).
      # Nothing in the project speaks the native protocol; every ClickHouse
      # client here uses HTTP on 8123 (config/serving.yaml, CLICKHOUSE_PORT).
      - "127.0.0.1:9010:9000"
    environment:
      CLICKHOUSE_DB: agentflow
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q 'Ok.'"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerting/rules.yml:/etc/prometheus/rules.yml
      - prometheus-data:/prometheus

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/pipeline_health.json
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  kafka-data:
  flink-checkpoints:
  minio-data:
  clickhouse-data:
  prometheus-data:
  grafana-data:
