{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentflow.fullname" . }}
  labels:
    {{- include "agentflow.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "agentflow.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- range .Values.networkPolicy.ingressFromNamespaces }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    # DNS — required for any service-name resolution.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Redis (rate limiting + cache).
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egressPorts.redis }}
    # Kafka brokers.
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egressPorts.kafka }}
    # ClickHouse HTTP backend (when SERVING_BACKEND=clickhouse).
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egressPorts.clickhouse }}
    # OTLP gRPC collector (when OTEL_EXPORTER_OTLP_ENDPOINT set).
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egressPorts.otlp }}
{{- end }}
