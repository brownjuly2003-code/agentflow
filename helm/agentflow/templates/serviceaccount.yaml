{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agentflow.serviceAccountName" . }}
  labels:
    {{- include "agentflow.labels" . | nindent 4 }}
  annotations:
    # The provision Job is a pre-install/pre-upgrade hook (weight -5). Helm
    # applies hook resources before regular release resources, so a normal SA
    # does not exist when that Job starts — first install hangs in
    # pending-install until the SA is created out-of-band (live E4 stand,
    # 2026-07-16). Own the SA as an earlier hook so install is self-contained.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    # Do not use hook-succeeded: Deployment/worker pods keep using this SA
    # after hooks finish. before-hook-creation replaces the previous copy on
    # the next pre-* run only.
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
