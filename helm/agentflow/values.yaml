nameOverride: ""
fullnameOverride: ""

replicaCount: 2

image:
  repository: agentflow/api
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 8000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: agentflow.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  storageClassName: ""
  mountPath: /data

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

probes:
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

# Pod-level security context — runs as non-root with a read-only root FS by
# default. The /data volume (PVC) is the only writable mount.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

# Container-level security context.
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop: ["ALL"]

# /tmp scratch needed when readOnlyRootFilesystem=true (Python tempfile,
# httpx caches, etc.). emptyDir backed by node memory.
tmpVolume:
  enabled: true
  sizeLimit: 256Mi

# PodDisruptionBudget keeps at least one replica online during voluntary
# disruptions (cluster upgrades, node drains).
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# NetworkPolicy enforces a default-deny baseline plus explicit ingress on the
# HTTP port and egress to dependencies (DNS, Kubernetes API, Redis, Kafka,
# ClickHouse, OTLP collector). Disabled by default so existing clusters
# without a NetworkPolicy controller are not broken; turn on per environment.
networkPolicy:
  enabled: false
  ingressFromNamespaces:
    - kubernetes.io/metadata.name: ingress-nginx
  egressPorts:
    redis: 6379
    kafka: 9092
    clickhouse: 8123
    otlp: 4317

config:
  duckdbPath: /data/agentflow.duckdb
  usageDbPath: /data/agentflow_api.duckdb
  apiKeysPath: /etc/agentflow/secret/api_keys.yaml
  tenantsPath: /etc/agentflow/config/tenants.yaml
  sloPath: /etc/agentflow/config/slo.yaml
  piiFieldsPath: /etc/agentflow/config/pii_fields.yaml
  securityPath: /etc/agentflow/config/security.yaml
  apiVersionsPath: /etc/agentflow/config/api_versions.yaml
  contractsDir: /app/config/contracts
  rateLimitRpm: 120
  cacheTtlSeconds: 30
  corsOrigins: http://localhost:3000
  redisUrl: ""
  otlpEndpoint: ""
  otlpServiceName: agentflow-api
  tenants:
    tenants:
      - id: acme-corp
        display_name: "Acme Corp"
        kafka_topic_prefix: "acme"
        duckdb_schema: "acme"
        max_events_per_day: 1000000
        max_api_keys: 10
        allowed_entity_types: null
      - id: demo
        display_name: "Demo Tenant"
        kafka_topic_prefix: "demo"
        duckdb_schema: "demo"
        max_events_per_day: 10000
        max_api_keys: 2
        allowed_entity_types:
          - "order"
          - "product"
  slo: |
    slos:
      - name: api_latency_p95
        description: "95th percentile API latency < 100ms for entity queries"
        target: 0.99
        measurement: p95_latency_ms
        threshold: 100
        window_days: 30

      - name: data_freshness
        description: "Pipeline data freshness < 30 seconds"
        target: 0.999
        measurement: freshness_seconds
        threshold: 30
        window_days: 7

      - name: error_rate
        description: "API error rate (5xx) < 0.1%"
        target: 0.999
        measurement: error_rate_percent
        threshold: 0.1
        window_days: 30
  piiFields: |
    masking:
      default_strategy: partial

      entity_fields:
        user:
          - field: email
            strategy: partial
          - field: phone
            strategy: partial
          - field: full_name
            strategy: partial
          - field: ip_address
            strategy: hash

        order:
          - field: shipping_address
            strategy: partial

      pii_exempt_tenants:
        - "internal-analytics"
        - "compliance-audit"
  security: |
    security:
      key_hashing: bcrypt
      bcrypt_rounds: 12
      min_key_length: 32
      max_failed_auth_per_ip_per_hour: 10
      sensitive_headers_to_redact:
        - Authorization
        - X-API-Key
      request_size_limit_bytes: 1048576
  apiVersions: |
    versions:
      - date: "2026-01-01"
        status: stable
        changes: []

      - date: "2026-04-11"
        status: latest
        changes:
          - type: additive
            description: "Added meta.is_historical to entity responses"
          - type: additive
            description: "Added X-PII-Masked response header"

secrets:
  adminKey: ""
  apiKeys:
    keys:
      - key_id: "support-agent"
        key_hash: "$2b$12$UNE9Vh.YivKR7Zt7xIZweebebjkcVaQv240rqabzG/H3dWoljplcO"
        name: "Support Agent"
        tenant: "acme-corp"
        rate_limit_rpm: 60
        allowed_entity_types:
          - "order"
          - "user"
        created_at: "2026-04-10"
      - key_id: "ops-agent"
        key_hash: "$2b$12$V3xTQLf35Snz15N.cNS8yOPkR/1TWIJXt4jLNZeGXlIbHXsvYC8jW"
        name: "Ops Agent"
        tenant: "acme-corp"
        rate_limit_rpm: 300
        allowed_entity_types: null
        created_at: "2026-04-10"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: agentflow

nodeSelector: {}
tolerations: []
extraEnv: []
