nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: agentflow/api
  tag: "1.6.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 8000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: agentflow.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  storageClassName: ""
  mountPath: /data

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

probes:
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

# Pod-level security context — runs as non-root with a read-only root FS by
# default. The /data volume (PVC) is the only writable mount.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

# Container-level security context.
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop: ["ALL"]

# /tmp scratch needed when readOnlyRootFilesystem=true (Python tempfile,
# httpx caches, etc.). emptyDir backed by node memory.
tmpVolume:
  enabled: true
  sizeLimit: 256Mi

# PodDisruptionBudget keeps at least one replica online during voluntary
# disruptions (cluster upgrades, node drains).
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# NetworkPolicy enforces a default-deny baseline plus explicit ingress on the
# HTTP port and egress to dependencies (DNS, Kubernetes API, Redis, Kafka,
# ClickHouse, OTLP collector). Disabled by default so existing clusters
# without a NetworkPolicy controller are not broken; turn on per environment.
networkPolicy:
  enabled: false
  ingressFromNamespaces:
    - kubernetes.io/metadata.name: ingress-nginx
  egressPorts:
    redis: 6379
    kafka: 9092
    clickhouse: 8123
    otlp: 4317

# Serving engine (ADR 0006 / 0007 / 0009). The shipped demo runs ClickHouse;
# the chart's default stays the safe single-node DuckDB profile because the
# chart does not ship a ClickHouse service. To serve from an external
# ClickHouse set backend: clickhouse + clickhouse.host (password via
# existingSecret); NetworkPolicy egress for port 8123 is already declared.
# NOTE (ADR 0009): even on ClickHouse, replicaCount stays 1 — the control
# plane (webhooks/alerts/outbox/usage) is an embedded per-pod DuckDB store, so
# horizontal scaling is gated on externalizing it, not only on the engine.
# ADR 0010 enforces this at render time: templates/deployment.yaml fails any
# multi-replica render unless controlPlane.store=postgres AND
# serving.backend=clickhouse.
serving:
  backend: duckdb
  clickhouse:
    host: ""
    port: 8123
    database: agentflow
    user: default
    existingSecret: ""
    passwordKey: clickhouse-password

# Control-plane state (ADR 0009 / ADR 0010): webhook queue+log, alert rules and
# history, outbox, dead-letter and usage accounting. 'embedded' = per-pod
# DuckDB + config files — correct for the single-replica profile, a split-brain
# at replicaCount > 1 (duplicate deliveries, forked alert state). ADR 0010
# externalizes this state to PostgreSQL behind a ControlPlaneStore port; until
# that adapter ships, the values schema pins store=embedded (fail-closed
# ratchet) and the chart refuses any multi-replica render.
controlPlane:
  store: embedded

config:
  duckdbPath: /data/agentflow.duckdb
  usageDbPath: /data/agentflow_api.duckdb
  apiKeysPath: /etc/agentflow/secret/api_keys.yaml
  tenantsPath: /etc/agentflow/config/tenants.yaml
  sloPath: /etc/agentflow/config/slo.yaml
  securityPath: /etc/agentflow/config/security.yaml
  apiVersionsPath: /etc/agentflow/config/api_versions.yaml
  contractsDir: /app/config/contracts
  rateLimitRpm: 120
  cacheTtlSeconds: 30
  corsOrigins: http://localhost:3000
  redisUrl: ""
  otlpEndpoint: ""
  otlpServiceName: agentflow-api
  tenants:
    tenants:
      - id: acme-corp
        display_name: "Acme Corp"
        kafka_topic_prefix: "acme"
        duckdb_schema: "acme"
        max_events_per_day: 1000000
        max_api_keys: 10
        allowed_entity_types: null
      - id: demo
        display_name: "Demo Tenant"
        kafka_topic_prefix: "demo"
        duckdb_schema: "demo"
        max_events_per_day: 10000
        max_api_keys: 2
        allowed_entity_types:
          - "order"
          - "product"
  slo: |
    slos:
      - name: api_latency_p95
        description: "95th percentile API latency < 100ms for entity queries"
        target: 0.99
        measurement: p95_latency_ms
        threshold: 100
        window_days: 30

      - name: data_freshness
        description: "Pipeline data freshness < 30 seconds"
        target: 0.999
        measurement: freshness_seconds
        threshold: 30
        window_days: 7

      - name: error_rate
        description: "API error rate (5xx) < 0.1%"
        target: 0.999
        measurement: error_rate_percent
        threshold: 0.1
        window_days: 30
  security: |
    security:
      key_hashing: bcrypt
      bcrypt_rounds: 12
      min_key_length: 32
      max_failed_auth_per_ip_per_hour: 10
      sensitive_headers_to_redact:
        - Authorization
        - X-API-Key
      request_size_limit_bytes: 1048576
  apiVersions: |
    versions:
      - date: "2026-01-01"
        status: stable
        changes: []

      - date: "2026-04-11"
        status: latest
        changes:
          - type: additive
            description: "Added meta.is_historical to entity responses"
          - type: additive
            description: "Added X-PII-Masked response header"

secrets:
  create: true
  existingSecret: ""
  adminKey: ""
  apiKeys:
    keys: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: agentflow

nodeSelector: {}
tolerations: []
extraEnv: []
