{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kafkaConnect.fullname" . }}
  labels:
    {{- include "kafkaConnect.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kafkaConnect.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- range .Values.networkPolicy.ingressFromNamespaces }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
        - protocol: TCP
          port: {{ .Values.service.metricsPort }}
  egress:
    # DNS — required for any service-name resolution.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kafka brokers — Connect publishes raw CDC topics + internal config/offset/status topics.
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egressPorts.kafka }}
    # PostgreSQL source — Debezium pgoutput logical replication.
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egressPorts.postgres }}
    # MySQL source — Debezium binlog reader.
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egressPorts.mysql }}
{{- end }}
