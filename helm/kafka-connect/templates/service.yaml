apiVersion: v1
kind: Service
metadata:
  name: {{ include "kafkaConnect.fullname" . }}
  labels:
    {{- include "kafkaConnect.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: rest
      protocol: TCP
      name: rest
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "kafkaConnect.selectorLabels" . | nindent 4 }}
