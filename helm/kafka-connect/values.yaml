nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: agentflow/kafka-connect
  tag: "local"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 8083
  metricsPort: 9101
  annotations: {}

kafka:
  bootstrapServers: kafka:9092
  internalTopicReplicationFactor: 1

topicBootstrap:
  enabled: true
  image:
    repository: confluentinc/cp-kafka
    tag: "7.7.0"
    pullPolicy: IfNotPresent

connect:
  groupId: agentflow-connect
  configStorageTopic: connect-agentflow-configs
  offsetStorageTopic: connect-agentflow-offsets
  statusStorageTopic: connect-agentflow-status
  pluginPath: /usr/share/java,/usr/share/confluent-hub-components,/usr/share/java/debezium
  offsetFlushIntervalMs: 10000
  configProviders: file
  configProvidersFileClass: org.apache.kafka.common.config.provider.FileConfigProvider

secrets:
  # Defaults below are placeholders for local-only kind/dev clusters.
  # Production deployments MUST set existingSecret to a Secret managed by
  # External Secrets Operator / Sealed Secrets / Vault. Never commit real
  # CDC credentials into chart values.
  create: true
  existingSecret: ""
  postgres:
    hostname: postgres-source
    user: cdc_reader
    password: REPLACE_ME_POSTGRES_CDC_PASSWORD
  mysql:
    hostname: mysql-source
    user: cdc_reader
    password: REPLACE_ME_MYSQL_CDC_PASSWORD

connectors:
  postgres:
    enabled: false
    name: agentflow-postgres-cdc
    database:
      port: 5432
      dbname: agentflow_demo
    topicPrefix: cdc.postgres
    slotName: agentflow_postgres_slot
    publicationName: agentflow_cdc_publication
    tableIncludeList: public.orders_v2,public.users_enriched
    signalDataCollection: agentflow_demo.public.debezium_signal
  mysql:
    enabled: false
    name: agentflow-mysql-cdc
    database:
      port: 3306
      serverId: 223345
      includeList: agentflow_demo
    topicPrefix: cdc.mysql
    tableIncludeList: agentflow_demo.products_current,agentflow_demo.sessions_aggregated
    schemaHistoryTopic: schemahistory.cdc.mysql.agentflow_demo

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

# Pod-level security context — Connect workers run as non-root with a
# read-only root filesystem. Confluent base image runs as UID 1000 ("appuser").
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container-level security context.
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop: ["ALL"]

# /tmp scratch required when readOnlyRootFilesystem=true; Kafka Connect uses
# /tmp for plugin extraction + JVM PID files. emptyDir backed by node memory.
tmpVolume:
  enabled: true
  sizeLimit: 256Mi

# PodDisruptionBudget keeps at least one worker online during voluntary
# disruptions (cluster upgrades, node drains). Connectors resume from stored
# offsets after task reassignment.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# NetworkPolicy enforces a default-deny baseline plus explicit ingress on the
# REST + metrics ports and egress to dependencies (DNS, Kafka brokers, source
# databases). Disabled by default so existing clusters without a NetworkPolicy
# controller are not broken; turn on per environment.
networkPolicy:
  enabled: false
  ingressFromNamespaces:
    - kubernetes.io/metadata.name: monitoring
  egressPorts:
    kafka: 9092
    postgres: 5432
    mysql: 3306

probes:
  readiness:
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6

affinity: {}
nodeSelector: {}
tolerations: []
extraEnv: []
