# RBAC for Argo Workflows executor running inside the dv2 namespace.
# Argo's emissary executor (default in v3.5+) needs permission to patch
# workflowtaskresults so the controller can pick up step status. The
# `executor` Role here is the documented minimal scope; the workflow
# templates explicitly bind to ServiceAccount `dv2-argo-runner` instead
# of `default` so the elevated permissions don't bleed to other pods.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dv2-argo-runner
  namespace: dv2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dv2-argo-executor
  namespace: dv2
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch", "get"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dv2-argo-executor
  namespace: dv2
subjects:
  - kind: ServiceAccount
    name: dv2-argo-runner
    namespace: dv2
roleRef:
  kind: Role
  name: dv2-argo-executor
  apiGroup: rbac.authorization.k8s.io
