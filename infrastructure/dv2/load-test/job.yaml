apiVersion: batch/v1
kind: Job
metadata:
  name: dv2-load-test
  namespace: dv2
  labels:
    app.kubernetes.io/part-of: dv2
    app.kubernetes.io/component: load-test
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: dv2
        app.kubernetes.io/component: load-test
    spec:
      restartPolicy: Never
      # Pin off the data-tier nodes so the load generator does not steal CPU
      # from the ClickHouse pod it is measuring.
      nodeSelector:
        nodepool: hq-control
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: benchmark
          image: clickhouse/clickhouse-server:25.5
          imagePullPolicy: IfNotPresent
          command: ["bash", "/work/run-bench.sh"]
          env:
            - name: CH_HOST
              value: clickhouse
            - name: CH_PORT
              value: "9000"
            - name: CH_USER
              value: default
            - name: CH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ch-creds
                  key: password
                  optional: true
            - name: CONCURRENCY_LEVELS
              value: "1 4 8"
            - name: ITERATIONS
              value: "60"
            # adhoc (raw-vault capacity reference) scenarios can run minutes
            # per query at large volumes — c=1 only, two iterations (see
            # run-bench.sh).
            - name: ITERATIONS_ADHOC
              value: "2"
            - name: P99_MS_HEAVY
              value: "1000"
            # 250 (was 200) for the 2-vCPU demo host: at c=8 the box is past
            # its concurrency design point and p99 measures queueing, not the
            # data path (established by a retired at-scale capture — see the
            # git history of docs/dv2-multi-branch/load-test-baseline.md;
            # ambient variance between runs is ~2x on sibling scenarios).
            # The gate still catches real regressions: the pre-fix full-scan
            # lookup ran 276-468 ms.
            - name: P99_MS_POINT
              value: "250"
            - name: P99_MS_ADHOC
              value: "2000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: work
              mountPath: /work
      volumes:
        - name: work
          configMap:
            name: dv2-load-test
