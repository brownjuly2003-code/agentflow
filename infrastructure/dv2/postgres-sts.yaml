apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: dv2
spec:
  replicas: 1
  serviceName: postgres
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        workload: postgres
      containers:
        - name: postgres
          image: postgres:17-alpine
          # Enable logical replication so ClickHouse's MaterializedPostgreSQL
          # engine can subscribe via WAL — replaces the pull-based PostgreSQL()
          # bridge with push-based CDC. See warehouse/agentflow/dv2/postgres_oltp/
          # README.md § "Push-based CDC variant".
          args:
            - "-c"
            - "wal_level=logical"
            - "-c"
            - "max_replication_slots=10"
            - "-c"
            - "max_wal_senders=10"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ops
            - name: POSTGRES_USER
              value: ops
            - name: POSTGRES_PASSWORD
              value: demo
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: dv2
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
