replicaCount: 1

image:
  repository: agentflow/api
  tag: "staging"
  pullPolicy: IfNotPresent

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

ingress:
  enabled: false

service:
  type: NodePort
  nodePort: 30080

autoscaling:
  enabled: false

persistence:
  enabled: false

probes:
  readiness:
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 15
    failureThreshold: 12
  liveness:
    initialDelaySeconds: 90
    periodSeconds: 20
    timeoutSeconds: 15
    failureThreshold: 6

config:
  corsOrigins: http://localhost:3000,http://127.0.0.1:3000
  redisUrl: redis://agentflow-redis:6379/0

# WARNING: do not commit real secrets here. See values-staging.yaml.example
# for a non-active template. Real values must be injected via secret manager.
secrets:
  adminKey: REPLACE_ME_ADMIN_KEY
  apiKeys:
    keys: []
