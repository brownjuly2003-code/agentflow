groups:
  - name: agentflow_pipeline
    interval: 30s
    rules:
      # ── Freshness SLA ────────────────────────────────────────
      - alert: FreshnessSLABreach
        expr: agentflow_sla_compliance_ratio < 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Data freshness SLA below 95%"
          description: >
            Topic {{ $labels.topic }} SLA compliance is {{ $value | humanizePercentage }}.
            Events are arriving later than the 30s SLA threshold.

      - alert: HighPipelineLatency
        expr: histogram_quantile(0.99, rate(agentflow_pipeline_latency_seconds_bucket[5m])) > 10
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Pipeline p99 latency above 10s"
          description: >
            Topic {{ $labels.topic }} p99 latency is {{ $value | humanizeDuration }}.

      # ── Throughput ───────────────────────────────────────────
      - alert: LowThroughput
        expr: rate(agentflow_freshness_events_total[5m]) < 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pipeline throughput dropped below 10 events/sec"
          description: >
            Topic {{ $labels.topic }} throughput is {{ $value | humanize }} events/sec.

      - alert: ZeroThroughput
        expr: rate(agentflow_freshness_events_total[5m]) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No events flowing through pipeline"
          description: >
            Topic {{ $labels.topic }} has had zero throughput for 5 minutes.

      # ── Component Health ─────────────────────────────────────
      - alert: ComponentUnhealthy
        expr: agentflow_pipeline_health == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Pipeline component {{ $labels.component }} is unhealthy"

      - alert: ComponentDegraded
        expr: agentflow_pipeline_health == 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pipeline component {{ $labels.component }} is degraded"

  - name: agentflow_control_plane
    interval: 30s
    rules:
      # ── PostgreSQL control-plane pool (audit P1-1) ───────────
      # Sustained waiters mean the connection budget is the bottleneck:
      # either a slow query is hogging checkouts or the budget
      # (AGENTFLOW_CONTROLPLANE_PG_POOL_MAX) is undersized for the load.
      - alert: ControlPlanePoolSaturated
        expr: agentflow_pg_pool_requests_waiting > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Control-plane PG pool has waiters for 5m"
          description: >
            {{ $value }} caller(s) are blocked waiting for a pooled
            control-plane connection. Check for slow queries, then consider
            raising AGENTFLOW_CONTROLPLANE_PG_POOL_MAX.

      # Usage accounting is a side-channel that sheds load instead of
      # failing requests — which means a non-zero drop rate is the ONLY
      # sign that per-tenant request counters are under-reporting.
      - alert: UsageRowsDropped
        expr: increase(agentflow_usage_rows_dropped_total[15m]) > 0
        labels:
          severity: warning
        annotations:
          summary: "api_usage rows are being shed"
          description: >
            The off-path usage writer dropped rows in the last 15m; tenant
            request accounting is under-reporting. The writer cannot keep up
            with the request rate — check pool waiters and PG latency.
