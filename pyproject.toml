[project]
name = "agentflow"
version = "0.1.0"
description = "Real-time data platform serving context to AI agents"
requires-python = ">=3.11"
license = { text = "MIT" }

dependencies = [
    "confluent-kafka>=2.5,<3",
    "fastapi>=0.111,<1",
    "uvicorn[standard]>=0.30,<1",
    "pyarrow>=17,<19",
    "pandera>=0.20,<1",
    "pydantic>=2.9,<3",
    "pydantic-settings>=2.5,<3",
    "httpx>=0.27,<1",
    "structlog>=24.4,<26",
    "prometheus-client>=0.21,<1",
    "duckdb>=1.1,<2",
    "dagster>=1.7,<2",
]

[project.optional-dependencies]
flink = [
    "apache-flink==1.19.1",
]
cloud = [
    "boto3>=1.35,<2",
    "pyiceberg>=0.7,<1",
]
dev = [
    "pytest>=8.3,<9",
    "pytest-asyncio>=0.24,<1",
    "pytest-cov>=5,<6",
    "ruff>=0.6,<1",
    "mypy>=1.11,<2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "PT"]
ignore = ["S101", "S311", "S608"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: marks tests requiring Docker services",
]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.11"
strict = true
