branches:
  msk:
    label: Moscow
  spb:
    label: Saint Petersburg
  ekb:
    label: Yekaterinburg
  dxb:
    label: Dubai
  ala:
    label: Almaty
  global:
    label: Global reference context
sources:
  1c:
    label: 1C UT
    entities: [customer, product, order, store, supplier, marking_code]
  1c_zup:
    label: 1C ZUP
    entities: [employee]
  bitrix:
    label: Bitrix24
    entities: [customer, order, employee]
  site:
    label: Site XML exchange
    entities: [customer, product, order]
  wms:
    label: WMS
    entities: [product, shipment, marking_code]
  excel:
    label: Excel logistics
    entities: [shipment]
  wb:
    label: Wildberries API
    entities: [customer, product, order]
  ozon:
    label: Ozon API
    entities: [customer, product, order]
  ref:
    label: Cloud supplier/product reference (Hugging Face Dataset)
    entities: [supplier, product, marking_code]
satellites:
  - name: sat_customer_personal__1c__msk
    hub: hub_customer
    parent_hk: customer_hk
    source_system: 1c
    branch_code: msk
    record_source: 1c__msk
    purpose: Customer PII from 1C for the Moscow branch.
    sources: [1c]
    branch_context: per-branch, hot jurisdictional PII
    scd2: true
    anonymization: hot
    attributes:
      - {name: first_name, type: String}
      - {name: last_name, type: String}
      - {name: email, type: String}
      - {name: phone, type: String}
      - {name: birth_date, type: Nullable(Date)}
      - {name: pii_flag, type: Bool DEFAULT true}
